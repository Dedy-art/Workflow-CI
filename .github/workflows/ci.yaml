
name: Machine Learning Workflow CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-train:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow scikit-learn pandas numpy matplotlib seaborn

    - name: Run MLflow Project (Sesuai Rekomendasi Reviewer)
      env:
        MLFLOW_TRACKING_URI: "file:///home/runner/work/Workflow-CI/Workflow-CI/mlruns"
        MLFLOW_ALLOW_FILE_STORE: "true"
      run: |
        mlflow run MLProject --env-manager=local

    - name: Upload MLflow Runs to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-local-runs
        path: mlruns/

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image from MLflow (Advanced Target)
      run: |
        MODEL_URI=$(find mlruns/ -type d -name "model" | head -n 1)
        mlflow models build-docker -m "$MODEL_URI" -n "${{ secrets.DOCKERHUB_USERNAME }}/predictive-maintenance-model:latest" --env-manager local

    - name: Push Docker Image
      run: |
        docker push "${{ secrets.DOCKERHUB_USERNAME }}/predictive-maintenance-model:latest"